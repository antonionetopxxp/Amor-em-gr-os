<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amor em Grãos</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{background:#000;color:#fff;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#000;
border-bottom:2px solid #7ED957;
}

.logo{
color:#7ED957;
font-weight:800;
font-size:18px;
}

nav{
display:flex;
gap:15px;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
}

/* HERO LIMPO */
.hero{
height:90vh;
background:url('banner.png') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

/* BOTÃO CENTRAL */
.btn{
padding:15px 30px;
background:#7ED957;
border:none;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

/* WHATSAPP REAL */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
z-index:1000;
}

.whatsapp img{
width:60px;
}

/* FORM OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:flex-start;
z-index:999;
}

.overlay.active{
display:flex;
}

/* FORM SLIDE */
.form-box{
width:320px;
height:100%;
background:#111;
padding:20px;
animation:slide 0.4s forwards;
}

@keyframes slide{
from{transform:translateX(-100%);}
to{transform:translateX(0);}
}

.form-box h2{
margin-bottom:10px;
}

.form-box input,
.form-box textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:5px;
}

.form-box button{
width:100%;
padding:12px;
background:#7ED957;
border:none;
font-weight:bold;
cursor:pointer;
}

/* RESPONSIVO */
@media(max-width:600px){
.logo{font-size:16px;}
nav a{font-size:14px;}
}
</style>
</head>

<body>

<!-- MENU -->
<header>
<div class="logo">☕ Amor em Grãos</div>

<nav>
<a href="#">Início</a>
<a href="#">Serviços</a>
<a href="#">Contato</a>
</nav>
</header>

<!-- HERO LIMPO -->
<section class="hero">
<button class="btn" onclick="abrirForm()">Solicitar Orçamento</button>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/5561991057795" target="_blank" class="whatsapp">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<!-- FORM -->
<div class="overlay" id="overlay" onclick="fecharForm(event)">

<div class="form-box" onclick="event.stopPropagation()">

<h2>Solicitar Orçamento</h2>

<input type="text" id="nome" placeholder="Seu nome">
<input type="tel" id="fone" placeholder="Telefone">
<textarea id="msg" placeholder="Descreva o que precisa"></textarea>

<button onclick="enviar()">Enviar via WhatsApp</button>

</div>

</div>

<script>
function abrirForm(){
document.getElementById("overlay").classList.add("active");
}

function fecharForm(e){
document.getElementById("overlay").classList.remove("active");
}

function enviar(){
let nome = document.getElementById("nome").value;
let fone = document.getElementById("fone").value;
let msg = document.getElementById("msg").value;

let texto = `Olá, quero orçamento:%0A Nome: ${nome}%0A Telefone: ${fone}%0A Pedido: ${msg}`;

window.open("https://wa.me/5561991057795?text="+texto);
}
</script>

</body>
</html>
